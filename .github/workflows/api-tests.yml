name: API Automation CI/CD

on:
  # 1. Triggered automatically when code is pushed to the main branch
  push:
    branches: [ "main" ]
  
  # 2. Triggered automatically every day at 03:00 AM UTC
  schedule:
    - cron: '0 3 * * *'
    
  # 3. Allows us to manually click a "Run workflow" button from the GitHub UI
  workflow_dispatch:

jobs:
  test-execution:
    name: Run Pytest Automation Suite
    # We rent a free Ubuntu virtual machine from GitHub
    runs-on: ubuntu-latest

    steps:
    - name: Step 1 - Checkout Repository
      uses: actions/checkout@v4

    - name: Step 2 - Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Step 3 - Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Step 4 - Execute Tests
      run: |
        pytest -v -s

    - name: Step 5 - Save Automation Log as Artifact
      # always() ensures we get the log even if the tests FAIL!
      if: always() 
      uses: actions/upload-artifact@v4
      with:
        name: execution-logs
        path: automation.log

    - name: Step 6 - Save Allure Raw Results as Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results-archive
        path: reports/